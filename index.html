<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filipino Heroes Fighter</title>
  <link rel="icon" type="image/png" href="FAF-logo.png" />
  <!-- Press Start 2P — Pixel / Pac-Man theme font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* ── Design Token Variables ─────────────────────────────── */
    :root {
      --font-pixel: 'Press Start 2P', cursive;

      /* Backgrounds */
      --bg-primary:          #000000;
      --bg-secondary:        #0A0A1A;
      --bg-secondary-medium: #0D0D22;
      --bg-secondary-strong: #141428;
      --bg-tertiary:         #0D0D22;
      --bg-quaternary:       #1A1A33;

      /* Brand */
      --brand:        #2A3FE5;
      --brand-medium: #1A2A8F;
      --brand-strong: #1E30B8;
      --brand-fg:     #5B6FFF;

      /* Text */
      --text-heading: #FFFFFF;
      --text-body:    #9CA3AF;
      --text-subtle:  #6B7280;
      --text-brand:   #2A3FE5;
      --text-yellow:  #FFCC00;
      --text-success: #00CC66;
      --text-danger:  #FF4444;

      /* Borders */
      --border-default:  #2A3FE5;
      --border-success:  #00CC66;
      --border-danger:   #FF0000;
      --border-warning:  #FFB852;
      --border-muted:    #1A1A33;
      --border-width: 2px;
      --border-style: solid;

      /* Status */
      --success:       #00CC66;
      --danger:        #FF0000;
      --warning:       #FFB852;

      /* Pac-Man ghost accent colors */
      --ghost-blinky: #FF0000;
      --ghost-pinky:  #FFB8FF;
      --ghost-inky:   #00FFDE;
      --ghost-clyde:  #FFB852;
      --pacman:       #FFCC00;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      overflow: hidden;
      font-family: var(--font-pixel);
    }
    #gameCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay .ui-panel { pointer-events: all; }

    /* ── Global UI element theme overrides ──────────────────── */

    /* Fix Press Start 2P line-height everywhere */
    * {
      line-height: 1.8;
    }

    /* Modal content needs extra breathing room */
    #ui-overlay div {
      box-sizing: border-box;
    }

    /* Leaderboard rows — ensure grid items don't overflow */
    .lb-row, .lb-row > * {
      line-height: 2.0 !important;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Scrollable modal content */
    #lb-body, #fp-grid {
      max-height: 50vh;
      overflow-y: auto;
    }

    /* All overlay panels / cards */
    .ui-panel > div,
    [style*="background:rgba(8,14,28"] {
      font-family: var(--font-pixel) !important;
    }

    /* Input fields */
    input[type="text"],
    input[type="password"] {
      font-family: var(--font-pixel) !important;
      font-size: 10px !important;
      background: var(--bg-primary) !important;
      color: var(--text-heading) !important;
      border: var(--border-width) var(--border-style) var(--border-default) !important;
      border-radius: 0 !important;
      outline: none;
      padding: 8px 10px !important;
    }
    input:focus {
      border-color: var(--brand-fg) !important;
      box-shadow: 0 0 0 2px rgba(42,63,229,0.3) !important;
    }
    input::placeholder { color: var(--text-subtle) !important; }

    /* Buttons */
    button {
      font-family: var(--font-pixel) !important;
      border-radius: 0 !important;
    }

    /* Scrollbars — pixel style */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border: 1px dotted var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand-fg); }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/pvp.js"></script>
  <script src="js/physics.js"></script>
  <script>
    // Catch any script errors and show them on screen
    window.addEventListener('error', function(e) {
      document.body.style.color = '#fff';
      document.body.style.fontFamily = 'monospace';
      document.body.style.padding = '20px';
      document.body.style.background = '#1a0000';
      document.body.innerHTML += '<br><b style="color:#ff4444">JS ERROR:</b> ' + e.message + ' in ' + e.filename + ':' + e.lineno;
    });
  </script>
  <script src="js/particles.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/playerStats.js"></script>
  <script src="js/api.js"></script>
  <script src="js/frameRenderer.js"></script>
  <script src="js/fighters/fighter.js"></script>
  <script src="js/fighters/lapuLapu.js"></script>
  <script src="js/fighters/pacquiao.js"></script>
  <script src="js/fighters/antonioLuna.js"></script>
  <script src="js/fighters/urduja.js"></script>
  <script src="js/fighters/sultanKudarat.js"></script>
  <script src="js/fighters/luces.js"></script>
  <script src="js/input.js"></script>
  <script src="js/battleBGRenderer.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/friendDrawer.js"></script>
  <script src="js/states/loginState.js"></script>
  <script src="js/states/homeState.js"></script>
  <script src="js/states/heroSelectState.js"></script>
  <script src="js/states/fightState.js"></script>
  <script src="js/states/winState.js"></script>
  <script src="js/states/pvpLobbyState.js"></script>
  <script src="js/states/pvpFightState.js"></script>
  <script src="js/visualEnhancer.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
